services:
  api:
    build: ./backend-go
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      ENGINE_ADDR: "engine:50051"
      AI_SERVICE_URL: "http://ai-service:8000"
    depends_on:
      - ai-service
      - engine

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"

  engine:
    build: ./cpp-engine
    ports:
      - "50051:50051"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api
